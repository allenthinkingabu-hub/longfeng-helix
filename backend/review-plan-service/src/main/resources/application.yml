server:
  port: 8085

spring:
  application:
    name: review-plan-service
  datasource:
    # 单库决策 (2026-05-17 用户拍板): 把 team-5-pg.review_* (review_plan +
    # review_outcome + review_plan_outbox · 共 74 行) 迁到 team-1-pg ·
    # 补 flyway_schema_history 1.0.050/051/054/055/066 5 条占位 (避免重跑) ·
    # 现在 wrongbook + review-plan 同库 (team-1-pg 15432).
    # 后续 P07 卡片可以直接 SQL join wrong_item 拿 subject/stem/kp · 不再 N+1 HTTP.
    url: jdbc:postgresql://localhost:15432/wrongbook
    username: longfeng
    password: longfeng_dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 单库迁移后 · 我们手插了 5 条 history 行 (checksum=0 占位) ·
    # 与文件实际 checksum 不匹配会 validate 失败 · dev 关掉校验即可.
    validate-on-migrate: false
  cache:
    type: caffeine

rocketmq:
  # 本地 dev 无 RocketMQ broker · spring-starter 强制要 nameServer 才肯启 ·
  # 给个占位地址 · listener 注册成功 · 实际拉消息会持续 retry 但不影响 HTTP API.
  # @Value("${review.mq.enabled:true}") 的开关只控制业务路径 · 不阻断 starter 自身.
  name-server: 127.0.0.1:9876

review:
  # 本地 dev: 跳过 feign fallback (CalendarFeignClientFallback 需要专配的
  # Cache<String,List<Map>> bean · auto-config 没给) · 也跳 MQ 路径.
  # SC-01 happy path 走 HTTP /internal/plans/from-question · 不依赖 feign/MQ.
  feign:
    enabled: false
  mq:
    enabled: false
  job:
    enabled: false
  algorithm:
    ease-init: 2.500
    ease-min: 1.300

app:
  snowflake:
    worker-id: 5

calendar:
  core-service:
    url: http://localhost:18080

# SC20-T02 · AI 辅助判题配置 (biz §6.4 字面 + §17 决策 sane defaults · 沿 longfeng.ai.* namespace 加 .judge 子段)
longfeng:
  ai:
    # judge 子段 (本 task 独立 · 与现役 longfeng.ai.fallback-chain 不冲突)
    judge:
      confidence-accept: 0.75
      confidence-fallback: 0.5
      timeout-primary-ms: 8000
      timeout-fallback-ms: 10000
      enable-photo-input: true
      image-retention-days: 30
      fallback-chain:
        - qianwen
        - qianwen-fallback-stub
      prompt-resource-path: classpath:/prompts/
      prompt-version: v1
      vision-model: qwen-vl-max
    # Qianwen (沿现役 ai-analysis-service AiProperties 模式 · review-plan-service 本地副本)
    qianwen:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      # api-key 由 env DASHSCOPE_API_KEY 覆盖 · 本地 dev 空字符串触发 fail-loud
      api-key: ${DASHSCOPE_API_KEY:}
