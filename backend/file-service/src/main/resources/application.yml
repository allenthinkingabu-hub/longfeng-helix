server:
  port: 8084

spring:
  application:
    name: file-service
  datasource:
    url: jdbc:postgresql://localhost:15432/wrongbook
    username: longfeng
    password: longfeng_dev
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 16379

app:
  snowflake:
    worker-id: 6
  storage:
    presign-ttl-min: 15
    minio:
      bucket: wrongbook-dev
    lifecycle:
      ia-after-days: 30
      archive-after-days: 180

file-service:
  storage:
    provider: minio
    endpoint: http://localhost:9000
    bucket: wrongbook-dev
    access-key: minioadmin
    secret-key: minioadmin
    presign-ttl-seconds: 900
    max-upload-size: 10485760
