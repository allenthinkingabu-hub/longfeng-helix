server:
  port: 8090

spring:
  application:
    name: anonymous-service
  datasource:
    url: jdbc:postgresql://127.0.0.1:15432/wrongbook
    username: longfeng
    password: longfeng_dev
  jpa:
    # Flyway owns DDL · Hibernate ddl-auto=none so we don't double-build schema.
    # (auth-service uses validate because it owns auth_user only; we have 7 anon tables
    # and only an AccountDevice entity, so validate would complain about un-mapped tables.)
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true
    # Namespaced under db/anonymous/ (NOT db/migration/) to avoid colliding with
    # the common module's own V*.sql files which Flyway also picks up from the
    # classpath. common's migrations target wrong_item / review_plan / etc and
    # depend on tables we do not own here. Mirrors auth-service's db/auth/ pattern.
    locations: classpath:db/anonymous
    table: flyway_schema_history_anonymous
    baseline-on-migrate: true
    baseline-version: 0
    # First-time runs against an existing shared PG may briefly observe rows
    # from the common module's V*.sql files (they still get picked up off the
    # classpath even when this service's locations is db/anonymous/, because
    # any failed first-run attempt against db/migration leaves rows behind).
    # Treat those as advisory; this service owns only V20260421_02 and onwards.
    ignore-migration-patterns: "*:missing"
  data:
    redis:
      host: 127.0.0.1
      port: 16379

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true

# Surface application name + version in /actuator/info so the smoke test
# can assert the right service answered the health probe.
info:
  app:
    name: anonymous-service
    description: PHASE-A skeleton — Flyway V20260421_02 (7 anonymous-state tables) + zod contracts owner
    version: 1.0.0-SNAPSHOT

# SC-00-T02 · JWT verification — SHARED with auth-service for HS256 sig parity.
# P0 OK to duplicate the literal here; P1 must source from Vault (TODO).
# These three fields MUST match auth-service application.yml byte-for-byte, or
# decision-tree node 1 (Authorization Bearer → HOME) will reject every login.
anon:
  jwt:
    # TODO(P1): rotate to Vault-backed secret · keep auth-service in lockstep
    secret: longfeng-auth-dev-jwt-secret-min-256-bits-do-not-use-in-prod-please-rotate
    issuer: longfeng
    audience: h5
  # SC-12 · biz §4.10 · guest_session 24h TTL (also applied to anonToken exp).
  # Overridable at runtime; integration tests rely on the 86400 default to
  # assert the now+24h expiresAt window.
  guest-session-ttl-sec: 86400
  # SC-12-T04 · biz §2B.13 SC-12 F03 · POST /api/anon/file/presign · temporary
  # OSS bucket for guest-capture flow (5-min TTL · auto-clean after 24h via
  # lifecycle policy · not in this task). Note prefix is `anon.storage.*`
  # deliberately DISJOINT from file-service `file-service.storage.*` so the
  # two services can never accidentally trample each other's ConfigurationProperties bean.
  #
  # P0 dev defaults match the sandbox Minio at localhost:9000 (minioadmin /
  # minioadmin) — same instance file-service uses, separate bucket. P1 will
  # inject real OSS keys via Vault.
  storage:
    provider: minio
    endpoint: http://localhost:9000
    bucket: guest-tmp
    access-key: minioadmin
    secret-key: minioadmin
    presign-ttl-seconds: 300
    max-upload-size: 10485760
  # SC-12-T06 · biz §2B.13 F04 · POST /api/anon/analyze-by-url forwards the
  # captured image to the real ai-analysis-service over HTTP. Same shared
  # sandbox instance the registered-user flow uses; ai-analysis-service then
  # calls Qianwen VL externally. No mock in either dev or test.
  # Property root MUST be `anon.ai-analysis` (kebab-case under existing anon.*
  # mapping) — NOT a sibling top-level key, to avoid YAML duplicate-key bug
  # surfaced in T04 (separate `anon:` blocks silently dropped earlier keys).
  ai-analysis:
    base-url: http://localhost:8083
    connect-timeout-ms: 2000
    read-timeout-ms: 5000
  # SC-12-T08 · biz §2B.13 F08 · POST /api/anon/claim forwards to wrongbook-service:8082
  # POST /api/wb/questions to create the wb_question row + assign qid for the
  # newly-registered student. Same shared sandbox the registered-user flow uses;
  # NO MOCK (user iron rule 2026-05-18) — real RestTemplate + real :8082.
  # P0 default; P1 will inject via Vault. The 502 path IT overrides this to
  # http://localhost:65535 via @DynamicPropertySource for a real ECONNREFUSED.
  wrongbook:
    base-url: http://localhost:8082

# SC-13-SHARER · POST /api/share/tokens 用 shareUrl 模板 ${share.public-base-url}/s/${shareToken}.
# P0 默认指向 vite dev 端口 (与前端 H5 SharedView 路由 /s/:token 对齐).
# P1: prod 由 CD pipeline 覆盖为 https://h5.longfeng.example.
share:
  public-base-url: http://localhost:5173

