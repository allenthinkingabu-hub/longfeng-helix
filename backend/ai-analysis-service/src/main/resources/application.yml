server:
  port: 8083

spring:
  application:
    name: ai-analysis-service
  datasource:
    url: jdbc:postgresql://localhost:5432/wrongbook
    username: postgres
    password: wb
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

# AI provider configuration
longfeng:
  ai:
    fallback-chain: qianwen,openai,zhipu
    stream-timeout-seconds: 60
    chunk-interval-seconds: 15
    heartbeat-interval-seconds: 30
  snowflake:
    worker-id: 4
