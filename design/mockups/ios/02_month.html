<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>月视图 · 通用日历</title>
<style>
:root{
  --blue:#007AFF; --red:#FF3B30; --orange:#FF9500; --green:#34C759; --indigo:#5856D6; --yellow:#FFCC00;
  --gray1:#8E8E93; --gray5:#E5E5EA; --gray6:#F2F2F7;
  --label:#000; --label2:#3C3C4399; --label3:#3C3C434D;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);-webkit-font-smoothing:antialiased}
body{background:linear-gradient(180deg,#EAF1FB 0%,#F7F6FA 55%,#FDF1F4 100%);display:grid;place-items:center;padding:40px;color:var(--label)}
.phone{position:relative;width:393px;height:852px;background:#F2F2F7;border-radius:55px;
  box-shadow:0 40px 100px -20px rgba(30,40,80,.35),0 8px 24px rgba(20,30,60,.12),inset 0 0 0 6px #111;overflow:hidden;}
.phone::before{content:"";position:absolute;top:11px;left:50%;transform:translateX(-50%);width:125px;height:37px;background:#000;border-radius:20px;z-index:30;}
.status{position:absolute;inset:0 0 auto 0;height:54px;padding:18px 34px 0;display:flex;justify-content:space-between;align-items:flex-start;font-size:17px;font-weight:600;z-index:25;color:#000;}
.status .right{display:flex;gap:6px;align-items:center}
.navbar{
  position:absolute;top:54px;left:0;right:0;padding:6px 20px 10px;z-index:22;
  background:rgba(242,242,247,.82);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
  border-bottom:.5px solid rgba(60,60,67,.12);
}
.nav-top{display:flex;justify-content:space-between;align-items:center;height:44px;font-size:17px;font-weight:600}
.nav-top .btn-icn{width:30px;height:30px;border-radius:15px;display:grid;place-items:center;color:var(--blue)}
.large-title{font-size:34px;font-weight:700;letter-spacing:-.5px;margin-top:4px;display:flex;align-items:baseline;gap:10px}
.large-title small{font-size:34px;color:var(--label3);font-weight:700}
.sub-nav{display:flex;gap:8px;margin-top:12px}
.seg{
  background:rgba(120,120,128,.12);border-radius:9px;padding:2px;display:flex;font-size:13px;font-weight:600;color:var(--label);flex:0 0 auto;
}
.seg span{padding:6px 12px;border-radius:7px;color:var(--label2)}
.seg span.on{background:#fff;color:var(--label);box-shadow:0 1px 2px rgba(0,0,0,.06),0 3px 8px rgba(0,0,0,.04)}
.sub-nav .grow{flex:1}
.today-chip{padding:6px 12px;background:#fff;border-radius:8px;font-size:13px;font-weight:600;color:var(--blue);box-shadow:0 1px 2px rgba(0,0,0,.06)}

.body{position:absolute;top:188px;left:0;right:0;bottom:83px;overflow:hidden;padding:10px 0 0;}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px 6px;color:var(--label2);font-size:12px;font-weight:500;text-align:center;letter-spacing:.5px}
.weekdays .we{color:var(--red);opacity:.85}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 10px}
.cell{
  height:56px;border-radius:10px;padding:6px 4px 4px;position:relative;
  display:flex;flex-direction:column;align-items:center;
  background:transparent;
}
.cell .d{font-size:16px;font-weight:500;letter-spacing:-.2px;color:var(--label)}
.cell.mute .d{color:var(--label3)}
.cell.weekend .d{color:var(--red)}
.cell.today{background:rgba(10,132,255,.08)}
.cell.today .d{background:var(--blue);color:#fff;width:28px;height:28px;border-radius:14px;display:grid;place-items:center;font-weight:600;box-shadow:0 3px 8px rgba(10,132,255,.35)}
.cell.selected{background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.04),0 6px 16px rgba(0,0,0,.06)}
.dots{margin-top:4px;display:flex;gap:3px}
.dot{width:5px;height:5px;border-radius:50%}
.d-b{background:var(--blue)} .d-o{background:var(--orange)} .d-g{background:var(--green)} .d-i{background:var(--indigo)} .d-y{background:var(--yellow)}

.list{
  position:absolute;left:0;right:0;bottom:83px;background:#fff;border-top-left-radius:22px;border-top-right-radius:22px;
  padding:14px 18px 14px;box-shadow:0 -8px 24px rgba(0,0,0,.05);
  height:286px;
}
.list-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.list-head .t{font-size:20px;font-weight:700;letter-spacing:-.3px}
.list-head .sub{color:var(--label2);font-size:13px;margin-left:8px;font-weight:500}
.list-head .more{color:var(--blue);font-size:14px;font-weight:500}
.row{
  display:flex;gap:12px;padding:12px 0;border-bottom:.5px solid rgba(60,60,67,.08);align-items:center;
}
.row:last-child{border-bottom:0}
.bar{width:3.5px;align-self:stretch;border-radius:2px;flex:0 0 3.5px}
.row .content{flex:1;min-width:0}
.row .ti{font-size:15px;font-weight:600;letter-spacing:-.2px;display:flex;gap:8px;align-items:center}
.tag{
  font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;letter-spacing:.2px;
}
.row .meta{display:flex;gap:8px;color:var(--label2);font-size:12px;margin-top:3px;font-weight:500}
.row .time{font-size:15px;font-weight:600;letter-spacing:-.2px;color:var(--label);font-variant-numeric:tabular-nums}
.row .time small{color:var(--label2);font-size:11px;font-weight:500;display:block;margin-top:2px;letter-spacing:.3px}

.tabbar{
  position:absolute;bottom:0;left:0;right:0;height:83px;padding:8px 0 20px;
  background:rgba(255,255,255,.85);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
  border-top:.5px solid rgba(60,60,67,.12);display:flex;
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--gray1);font-size:10px;font-weight:500;letter-spacing:.2px}
.tab.on{color:var(--blue)}
.fab{
  position:absolute;right:20px;bottom:110px;width:56px;height:56px;border-radius:28px;
  background:linear-gradient(180deg,#1E94FF,#0A84FF);display:grid;place-items:center;color:#fff;
  box-shadow:0 14px 30px -6px rgba(10,132,255,.55),0 6px 14px rgba(10,132,255,.3),inset 0 1px 0 rgba(255,255,255,.2);
}
.homebar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:#000;opacity:.85;z-index:50}
</style>
</head>
<body>
<div class="phone">
  <div class="status">
    <span>9:41</span>
    <div class="right">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="1" width="3" height="11" rx="1"/><rect x="15" y="-2" width="3" height="14" rx="1" opacity=".35"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2c3.5 0 6.6 1.4 8.5 3.5l-1.5 1.3C13.9 5 11.3 3.8 8.5 3.8S3.1 5 1.5 6.8L0 5.5C1.9 3.4 5 2 8.5 2zm0 3c2.4 0 4.5 1 6 2.5L13 8.8c-1.2-1.1-2.8-1.8-4.5-1.8S5.2 7.7 4 8.8L2.5 7.5C4 6 6.1 5 8.5 5zm0 3c1.3 0 2.5.5 3.4 1.3L8.5 13 5.1 9.3C6 8.5 7.2 8 8.5 8z"/></svg>
      <svg width="28" height="12" viewBox="0 0 28 12" fill="none"><rect x=".5" y=".5" width="24" height="11" rx="3" stroke="currentColor" opacity=".5"/><rect x="26" y="4" width="1.5" height="4" rx=".75" fill="currentColor" opacity=".5"/><rect x="2.5" y="2.5" width="20" height="7" rx="1.5" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="navbar">
    <div class="nav-top">
      <div class="btn-icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 6 9 12 15 18"/></svg></div>
      <span style="color:var(--blue);font-weight:500">今天</span>
      <div class="btn-icn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg></div>
    </div>
    <div class="large-title">2026 年 4 月 <small>星期二</small></div>
    <div class="sub-nav">
      <div class="seg">
        <span>日</span><span>周</span><span class="on">月</span>
      </div>
      <div class="grow"></div>
      <div class="today-chip">21 · 今天</div>
    </div>
  </div>

  <div class="body">
    <div class="weekdays"><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div class="we">六</div><div class="we">日</div></div>
    <div class="grid">
      <!-- week 1 (partly last month) -->
      <div class="cell mute"><div class="d">30</div></div>
      <div class="cell mute"><div class="d">31</div></div>
      <div class="cell"><div class="d">1</div><div class="dots"><span class="dot d-b"></span></div></div>
      <div class="cell"><div class="d">2</div><div class="dots"><span class="dot d-o"></span><span class="dot d-b"></span></div></div>
      <div class="cell"><div class="d">3</div></div>
      <div class="cell weekend"><div class="d">4</div><div class="dots"><span class="dot d-i"></span></div></div>
      <div class="cell weekend"><div class="d">5</div></div>
      <!-- week 2 -->
      <div class="cell"><div class="d">6</div><div class="dots"><span class="dot d-b"></span></div></div>
      <div class="cell"><div class="d">7</div><div class="dots"><span class="dot d-o"></span></div></div>
      <div class="cell"><div class="d">8</div></div>
      <div class="cell"><div class="d">9</div><div class="dots"><span class="dot d-g"></span><span class="dot d-b"></span></div></div>
      <div class="cell"><div class="d">10</div><div class="dots"><span class="dot d-y"></span></div></div>
      <div class="cell weekend"><div class="d">11</div></div>
      <div class="cell weekend"><div class="d">12</div><div class="dots"><span class="dot d-i"></span></div></div>
      <!-- week 3 -->
      <div class="cell"><div class="d">13</div><div class="dots"><span class="dot d-b"></span></div></div>
      <div class="cell"><div class="d">14</div></div>
      <div class="cell"><div class="d">15</div><div class="dots"><span class="dot d-o"></span><span class="dot d-b"></span></div></div>
      <div class="cell"><div class="d">16</div><div class="dots"><span class="dot d-g"></span></div></div>
      <div class="cell"><div class="d">17</div></div>
      <div class="cell weekend"><div class="d">18</div><div class="dots"><span class="dot d-b"></span></div></div>
      <div class="cell weekend"><div class="d">19</div></div>
      <!-- week 4 with today -->
      <div class="cell"><div class="d">20</div><div class="dots"><span class="dot d-b"></span></div></div>
      <div class="cell today"><div class="d">21</div><div class="dots"><span class="dot d-b"></span><span class="dot d-o"></span><span class="dot d-g"></span></div></div>
      <div class="cell"><div class="d">22</div><div class="dots"><span class="dot d-i"></span></div></div>
      <div class="cell"><div class="d">23</div><div class="dots"><span class="dot d-b"></span></div></div>
      <div class="cell"><div class="d">24</div><div class="dots"><span class="dot d-y"></span></div></div>
      <div class="cell weekend"><div class="d">25</div><div class="dots"><span class="dot d-o"></span></div></div>
      <div class="cell weekend"><div class="d">26</div></div>
      <!-- week 5 -->
      <div class="cell"><div class="d">27</div><div class="dots"><span class="dot d-b"></span></div></div>
      <div class="cell"><div class="d">28</div></div>
      <div class="cell"><div class="d">29</div><div class="dots"><span class="dot d-g"></span></div></div>
      <div class="cell"><div class="d">30</div><div class="dots"><span class="dot d-b"></span></div></div>
      <div class="cell mute"><div class="d">1</div></div>
      <div class="cell mute weekend"><div class="d">2</div></div>
      <div class="cell mute weekend"><div class="d">3</div></div>
    </div>
  </div>

  <div class="list">
    <div class="list-head">
      <div><span class="t">今日事项</span><span class="sub">3 条 · Asia/Shanghai</span></div>
      <span class="more">查看全部</span>
    </div>
    <div class="row">
      <div class="bar" style="background:var(--blue)"></div>
      <div class="content">
        <div class="ti">Hibernate 二级缓存复习 <span class="tag" style="background:rgba(10,132,255,.12);color:var(--blue)">学习</span></div>
        <div class="meta"><span>阶段 3 / 5</span><span>·</span><span>下次 5 月 2 日</span></div>
      </div>
      <div class="time">14:30<small>SHA</small></div>
    </div>
    <div class="row">
      <div class="bar" style="background:var(--orange)"></div>
      <div class="content">
        <div class="ti">周会输出 OKR 季度总结 <span class="tag" style="background:rgba(255,149,0,.14);color:#B36B00">任务</span></div>
        <div class="meta"><span>优先级 P0</span><span>·</span><span>截止 18:00</span></div>
      </div>
      <div class="time">16:00<small>SHA</small></div>
    </div>
    <div class="row">
      <div class="bar" style="background:var(--green)"></div>
      <div class="content">
        <div class="ti">接女儿放学 <span class="tag" style="background:rgba(52,199,89,.14);color:#1E7E34">提醒</span></div>
        <div class="meta"><span>每工作日重复</span></div>
      </div>
      <div class="time">17:40<small>SHA</small></div>
    </div>
  </div>

  <div class="fab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </div>

  <div class="tabbar">
    <div class="tab on">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      日历
    </div>
    <div class="tab">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      事项
    </div>
    <div class="tab">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      通知
    </div>
    <div class="tab">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      我
    </div>
  </div>

  <div class="homebar"></div>
</div>
</body>
</html>
