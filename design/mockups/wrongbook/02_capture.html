<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>01 / 拍题入口 · AI 错题本</title>
<style>
  :root{
    --blue:#007AFF; --red:#FF3B30; --orange:#FF9500; --green:#34C759; --indigo:#5856D6; --yellow:#FFCC00;
    --text:#1C1C1E; --text2:#3C3C43; --text3:#8E8E93; --sep:rgba(60,60,67,.14);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  html,body{height:100%;}
  body{font-family:var(--font);color:var(--text);background:
    radial-gradient(1200px 800px at 10% -10%, #E8EEFB 0%, transparent 60%),
    radial-gradient(1000px 700px at 110% 10%, #F5E8FB 0%, transparent 55%),
    linear-gradient(180deg,#EEF2F8 0%,#E6ECF5 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 0;}
  .stage{display:flex;flex-direction:column;align-items:center;gap:18px;}
  .caption{font-size:13px;color:#5E6B82;letter-spacing:.08em;text-transform:uppercase;}
  .phone{position:relative;width:393px;height:852px;border-radius:55px;overflow:hidden;
    box-shadow:0 40px 100px -20px rgba(30,40,80,.35),0 8px 24px rgba(20,30,60,.12),inset 0 0 0 6px #111;}
  .phone::before{content:"";position:absolute;top:11px;left:50%;transform:translateX(-50%);width:125px;height:37px;background:#000;border-radius:20px;z-index:40;}
  .screen{position:absolute;inset:0;background:#0B0F1A;color:#fff;}
  .status{position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-weight:600;font-size:15px;color:#fff;z-index:30;}
  .status .r{display:flex;align-items:center;gap:6px;}
  .homebar{position:absolute;left:50%;transform:translateX(-50%);bottom:8px;width:134px;height:5px;border-radius:3px;background:#fff;opacity:.7;z-index:30;}

  /* Top transparent nav over camera */
  .nav{position:absolute;top:54px;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;z-index:25;}
  .nav .icon-btn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;color:#fff;}
  .nav .icon-btn svg{width:18px;height:18px;}
  .nav .title{font-size:16px;font-weight:600;letter-spacing:.2px;}

  /* Camera viewfinder */
  .view{position:absolute;top:104px;left:0;right:0;bottom:240px;background:
    radial-gradient(800px 400px at 50% 30%, #1d2433 0%, #0B0F1A 65%);
    overflow:hidden;}
  /* Faux textbook page in viewfinder */
  .paper{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%) rotate(-3deg);
    width:255px;height:330px;background:linear-gradient(180deg,#fbf8f0,#f1ece0);border-radius:6px;
    box-shadow:0 30px 70px rgba(0,0,0,.55),0 4px 12px rgba(0,0,0,.4);padding:22px 20px;color:#1a1a1a;font-family:Georgia,serif;}
  .paper .lbl{font-size:9px;color:#a78a3c;letter-spacing:.18em;text-transform:uppercase;font-family:var(--font);font-weight:700;}
  .paper .qno{display:inline-block;margin-top:8px;font-size:11px;font-weight:700;color:#7a3b3b;background:#fde9e9;border-radius:3px;padding:2px 6px;font-family:var(--font);}
  .paper h2{font-size:13px;line-height:1.55;margin-top:8px;font-weight:600;color:#222;}
  .paper .formula{margin-top:10px;text-align:center;font-style:italic;font-size:14px;color:#222;}
  .paper .formula em{color:#a02828;font-style:italic;font-weight:700;}
  .paper .opts{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;font-size:11px;color:#333;font-family:var(--font);}
  .paper .opts span{display:flex;gap:5px;}
  .paper .ans{margin-top:10px;font-size:11px;color:#666;font-family:var(--font);}
  .paper .strike{position:absolute;top:172px;left:24px;width:184px;height:18px;background:rgba(255,80,80,.55);transform:rotate(-2deg);border-radius:3px;}
  .paper .pen{position:absolute;top:198px;left:36px;font-family:"Caveat","Comic Sans MS",cursive;font-size:18px;color:#c9302c;transform:rotate(-3deg);}

  /* Corner brackets (auto detect) */
  .bracket{position:absolute;width:46px;height:46px;border:3px solid var(--yellow);box-shadow:0 0 18px rgba(255,204,0,.45);}
  .bracket.tl{top:14%;left:14%;border-right:0;border-bottom:0;border-top-left-radius:10px;}
  .bracket.tr{top:14%;right:14%;border-left:0;border-bottom:0;border-top-right-radius:10px;}
  .bracket.bl{bottom:14%;left:14%;border-right:0;border-top:0;border-bottom-left-radius:10px;}
  .bracket.br{bottom:14%;right:14%;border-left:0;border-top:0;border-bottom-right-radius:10px;}

  /* Scan line */
  .scan{position:absolute;left:14%;right:14%;top:48%;height:2px;background:linear-gradient(90deg,transparent,rgba(255,204,0,.95),transparent);box-shadow:0 0 18px rgba(255,204,0,.7);}

  /* Auto detect badge */
  .detect{position:absolute;top:122px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);color:#fff;font-size:12px;padding:7px 12px;border-radius:999px;display:flex;align-items:center;gap:7px;z-index:24;}
  .detect .pulse{width:7px;height:7px;border-radius:50%;background:var(--yellow);box-shadow:0 0 0 6px rgba(255,204,0,.18);}

  /* Tip card */
  .tip{position:absolute;left:18px;right:18px;top:148px;background:rgba(255,255,255,.12);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:.5px solid rgba(255,255,255,.15);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:10px;color:#fff;font-size:13px;letter-spacing:.1px;z-index:24;}
  .tip svg{width:18px;height:18px;flex:0 0 18px;color:var(--yellow);}
  .tip span{opacity:.92;}

  /* Subject quick selector */
  .subjects{position:absolute;left:0;right:0;bottom:228px;padding:0 18px;display:flex;gap:8px;overflow:hidden;z-index:24;}
  .subj{flex:1;height:36px;border-radius:10px;background:rgba(255,255,255,.10);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:.5px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;letter-spacing:.2px;}
  .subj.on{background:rgba(255,255,255,.95);color:var(--blue);border-color:transparent;box-shadow:0 6px 18px rgba(0,0,0,.18);}

  /* Control dock */
  .dock{position:absolute;left:0;right:0;bottom:84px;height:144px;background:linear-gradient(180deg,rgba(11,15,26,0) 0%, rgba(11,15,26,.85) 35%, #0B0F1A 100%);z-index:23;}
  .controls{position:absolute;left:0;right:0;top:32px;display:flex;align-items:center;justify-content:space-around;}
  .control-btn{display:flex;flex-direction:column;align-items:center;gap:4px;color:rgba(255,255,255,.85);font-size:11px;letter-spacing:.2px;}
  .control-btn .ic{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.10);border:.5px solid rgba(255,255,255,.18);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:center;color:#fff;}
  .control-btn .ic svg{width:22px;height:22px;}
  .shutter{width:78px;height:78px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px rgba(255,255,255,.18),0 0 0 8px rgba(255,255,255,.10),0 14px 28px rgba(0,0,0,.35);}
  .shutter .core{width:60px;height:60px;border-radius:50%;background:linear-gradient(180deg,#5FA8FF,var(--blue));border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;}
  .shutter .core svg{width:24px;height:24px;}

  /* Mode tabs */
  .modes{position:absolute;left:0;right:0;bottom:122px;display:flex;justify-content:center;gap:22px;font-size:12px;color:rgba(255,255,255,.55);z-index:24;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
  .modes .on{color:var(--yellow);}
  .modes .on::after{content:"";display:block;width:18px;height:2px;border-radius:2px;background:var(--yellow);margin:4px auto 0;}

  /* Tab bar */
  .tabbar{position:absolute;bottom:0;left:0;right:0;height:84px;padding:8px 0 24px;background:rgba(11,15,26,.78);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border-top:.5px solid rgba(255,255,255,.08);display:flex;z-index:25;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:rgba(255,255,255,.5);font-size:10px;}
  .tab.active{color:var(--yellow);}
  .tab svg{width:24px;height:24px;}
</style>
</head>
<body>
  <div class="stage">
    <div class="caption">1 / 8 · Capture · auto edge detect · subject quick pick</div>
    <div class="phone">
      <div class="screen">

        <!-- status bar -->
        <div class="status">
          <span>9:41</span>
          <div class="r">
            <svg width="17" height="11" viewBox="0 0 17 11"><g fill="#fff"><rect x="0" y="7" width="3" height="4" rx=".5"/><rect x="4.5" y="5" width="3" height="6" rx=".5"/><rect x="9" y="3" width="3" height="8" rx=".5"/><rect x="13.5" y="1" width="3" height="10" rx=".5"/></g></svg>
            <svg width="16" height="11" viewBox="0 0 16 11" fill="none"><path d="M8 3c2 0 3.8.7 5.2 1.9l1.4-1.4C12.8 1.9 10.5 1 8 1S3.2 1.9 1.4 3.5l1.4 1.4C4.2 3.7 6 3 8 3Z" fill="#fff"/><path d="M8 6c1.2 0 2.3.4 3.2 1.1l1.4-1.4C11.3 4.6 9.7 4 8 4s-3.3.6-4.6 1.7l1.4 1.4C5.7 6.4 6.8 6 8 6Z" fill="#fff"/><circle cx="8" cy="9" r="1.4" fill="#fff"/></svg>
            <svg width="26" height="12" viewBox="0 0 26 12"><rect x=".5" y=".5" width="22" height="11" rx="3" fill="none" stroke="#fff" opacity=".55"/><rect x="2" y="2" width="17" height="8" rx="1.6" fill="#fff"/><rect x="23" y="4" width="2" height="4" rx="1" fill="#fff" opacity=".55"/></svg>
          </div>
        </div>

        <!-- nav -->
        <div class="nav">
          <div class="icon-btn"><svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="title">拍下错题</div>
          <div class="icon-btn"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v3M12 16v3M5 12h3M16 12h3M7 7l2 2M15 15l2 2M7 17l2-2M15 9l2-2" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></div>
        </div>

        <!-- detect badge -->
        <div class="detect"><span class="pulse"></span>已识别页面边界 · 自动矫正中</div>

        <!-- tip -->
        <div class="tip" style="top:170px">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 3l9 4.5v6c0 5-3.6 8-9 9-5.4-1-9-4-9-9v-6L12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          <span>对准题目并保持稳定，AI 将自动裁剪并去除手写涂鸦</span>
        </div>

        <!-- viewfinder -->
        <div class="view">
          <div class="paper">
            <div class="lbl">数学 · 第 12 章 复习题</div>
            <div class="qno">17</div>
            <h2>已知函数 f(x) = x² − 4x + 3，求其顶点坐标与对称轴方程。</h2>
            <div class="formula">f(x) = (x − <em>1</em>)² − <em>2</em></div>
            <div class="opts">
              <span>A. (1, −2)</span><span>B. (2, −1)</span>
              <span>C. (−1, 2)</span><span>D. (2, 1)</span>
            </div>
            <div class="ans">学生作答：</div>
            <div class="strike"></div>
            <div class="pen">B ✗</div>
          </div>

          <div class="bracket tl"></div>
          <div class="bracket tr"></div>
          <div class="bracket bl"></div>
          <div class="bracket br"></div>
          <div class="scan"></div>
        </div>

        <!-- subjects -->
        <div class="subjects">
          <div class="subj on">数学</div>
          <div class="subj">物理</div>
          <div class="subj">化学</div>
          <div class="subj">英语</div>
          <div class="subj">语文</div>
        </div>

        <!-- modes -->
        <div class="modes">
          <span>相册</span>
          <span class="on">拍题</span>
          <span>文档</span>
        </div>

        <!-- dock -->
        <div class="dock"></div>
        <div class="controls">
          <div class="control-btn">
            <div class="ic"><svg viewBox="0 0 24 24" fill="none"><rect x="3.5" y="5" width="17" height="14" rx="2.5" stroke="#fff" stroke-width="1.8"/><circle cx="9" cy="11" r="2" stroke="#fff" stroke-width="1.8"/><path d="m4 18 5-4 4 3 7-6" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/></svg></div>
            <span>相册</span>
          </div>
          <div class="shutter"><div class="core"><svg viewBox="0 0 24 24" fill="none"><path d="M5 7h3l1.5-2h5L16 7h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="13" r="3.6" stroke="#fff" stroke-width="1.8"/></svg></div></div>
          <div class="control-btn">
            <div class="ic"><svg viewBox="0 0 24 24" fill="none"><path d="M7 3.5h7.5L19 8v12.5H7v-17Z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 12h6M9 15h4" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div>
            <span>文件</span>
          </div>
        </div>

        <!-- tab bar -->
        <div class="tabbar">
          <div class="tab"><svg viewBox="0 0 24 24" fill="none"><path d="M3 11 L12 3 L21 11 V20 a1 1 0 0 1 -1 1 H14 V14 H10 V21 H4 a1 1 0 0 1 -1 -1 Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg><span>首页</span></div>
          <div class="tab"><svg viewBox="0 0 24 24" fill="none"><path d="M5 4h11l3 3v13H5V4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M8 11h8M8 14h6M8 17h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>错题本</span></div>
          <div class="tab active"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="13" r="4.5" stroke="currentColor" stroke-width="1.8"/><path d="M5 8h3l1.5-2h5L16 8h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg><span>拍题</span></div>
          <div class="tab"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3.5c-3.6 0-6.2 2.6-6.2 6.2v3.4L4 15.5v1.3h16v-1.3l-1.8-2.4V9.7c0-3.6-2.6-6.2-6.2-6.2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 19.5a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>复习</span></div>
          <div class="tab"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8.5" r="3.8" stroke="currentColor" stroke-width="1.8"/><path d="M4.5 20c1.2-3.8 4.2-5.6 7.5-5.6s6.3 1.8 7.5 5.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>我的</span></div>
        </div>

        <div class="homebar"></div>
      </div>
    </div>
  </div>
</body>
</html>
